name: Compat Cache Fail On Cache Miss

on:
  workflow_dispatch:
    inputs:
      compat_key:
        description: Unique compat key that must miss
        required: true
        type: string
  push:
    tags-ignore:
      - "**"
    paths:
      - .github/workflows/__compat_cache_fail_on_cache_miss__.trigger

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - id: restore
        name: Restore cache
        uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          key: ${{ inputs.compat_key }}
          path: cache-dir
          fail-on-cache-miss: true
      - name: Build report
        shell: bash
        run: |
          mkdir -p report
          printf '%s|%s|%s' \
            "${{ steps.restore.outcome }}" \
            "${{ steps.restore.conclusion }}" \
            "$(if [ -f cache-dir/value.txt ]; then printf yes; else printf no; fi)" > report/result.txt
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: compat-cache-fail-on-cache-miss-report
          path: report/result.txt
