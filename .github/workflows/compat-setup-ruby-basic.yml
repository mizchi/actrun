name: Compat Setup Ruby Basic

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - "**"
    paths:
      - .github/workflows/__compat_setup_ruby_basic__.trigger

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - id: setup
        name: Setup Ruby
        uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1
        with:
          ruby-version: '3.3'
      - name: Build report
        shell: bash
        run: |
          mkdir -p report
          printf '%s' "$(ruby --version)" > report/result.txt
      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compat-setup-ruby-basic-report
          path: report/result.txt
