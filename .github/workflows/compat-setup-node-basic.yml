name: Compat Setup Node Basic

on:
  workflow_dispatch:
    inputs:
      compat_node_version:
        description: Exact Node.js version to install
        required: true
        type: string
  push:
    tags-ignore:
      - "**"
    paths:
      - .github/workflows/__compat_setup_node_basic__.trigger

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - id: setup
        name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ inputs.compat_node_version }}
          registry-url: https://registry.npmjs.org
      - name: Build report
        shell: bash
        run: |
          mkdir -p report
          printf '%s|%s|%s|%s|%s' \
            "${{ steps.setup.outputs.node-version }}" \
            "$(node --version)" \
            "$NODE_AUTH_TOKEN" \
            "$(test -f "$NPM_CONFIG_USERCONFIG" && echo yes || echo no)" \
            "$(tr '\n' ';' < "$NPM_CONFIG_USERCONFIG")" > report/result.txt
      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compat-setup-node-basic-report
          path: report/result.txt
