name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-14
            target: macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Checkout bit dependency
        run: git clone --depth 1 https://github.com/bit-vcs/bit.git ../../bit-vcs/bit
      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Build
        run: |
          moon update
          moon build --release --target native src/cmd/actrun
      - name: Package
        run: |
          BIN="_build/native/release/build/cmd/actrun/actrun.exe"
          OUT="actrun-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp "$BIN" dist/actrun
          chmod +x dist/actrun
          tar -C dist -czf "$OUT" actrun
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: actrun-${{ matrix.target }}
          path: "*.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          if gh release view "$TAG" -R "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" *.tar.gz --clobber -R "$REPO"
          else
            gh release create "$TAG" *.tar.gz --generate-notes -R "$REPO"
          fi

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Extract version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
