name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Secretlint
        if: ${{ !env.ACTRUN_LOCAL }}
        run: npx --yes -p secretlint -p @secretlint/secretlint-rule-preset-recommend secretlint "**/*"
      - name: Checkout bit dependency
        if: ${{ !env.ACTRUN_LOCAL }}
        run: git clone --depth 1 https://github.com/bit-vcs/bit.git ../../bit-vcs/bit
      - name: Setup just
        uses: extractions/setup-just@v3
      - name: Install MoonBit CLI
        if: ${{ !env.ACTRUN_LOCAL }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Moon version
        run: moon version --all
      - name: Moon update
        if: ${{ !env.ACTRUN_LOCAL }}
        run: moon update
      - name: Verify format
        run: just fmt-check
      - name: Verify generated interfaces
        run: just info-check

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: native
          - os: macos-latest
            target: native
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Checkout bit dependency
        if: ${{ !env.ACTRUN_LOCAL }}
        run: git clone --depth 1 https://github.com/bit-vcs/bit.git ../../bit-vcs/bit
      - name: Setup just
        uses: extractions/setup-just@v3
      - name: Install MoonBit CLI
        if: ${{ !env.ACTRUN_LOCAL }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Moon version
        run: moon version --all
      - name: Moon update
        if: ${{ !env.ACTRUN_LOCAL }}
        run: moon update
      - name: Moon check
        run: just target=${{ matrix.target }} check
      - name: Moon test
        run: just target=${{ matrix.target }} test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Checkout bit dependency
        if: ${{ !env.ACTRUN_LOCAL }}
        run: git clone --depth 1 https://github.com/bit-vcs/bit.git ../../bit-vcs/bit
      - name: Setup just
        uses: extractions/setup-just@v3
      - name: Install MoonBit CLI
        if: ${{ !env.ACTRUN_LOCAL }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Moon update
        if: ${{ !env.ACTRUN_LOCAL }}
        run: moon update
      - name: Build CLI
        run: moon build src/cmd/actrun --target native
      - name: Run E2E scenarios
        run: just e2e

  examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - examples/01-hello.yml
          - examples/02-env-and-outputs.yml
          - examples/03-matrix.yml
          - examples/04-multi-job.yml
          - examples/05-secrets.yml
          - examples/06-local-skip.yml
          - examples/07-artifacts.yml
          - examples/09-conditional.yml
          - examples/21-schedule.yml
        mode:
          - --worktree
          - --local
          - --tmp
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Checkout bit dependency
        run: git clone --depth 1 https://github.com/bit-vcs/bit.git ../../bit-vcs/bit
      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Moon update
        run: moon update
      - name: Build CLI
        run: moon build src/cmd/actrun --target native
      - name: Run example
        run: |
          ACTRUN=_build/native/release/build/cmd/actrun/actrun.exe
          $ACTRUN ${{ matrix.example }} ${{ matrix.mode }} --trust --trigger push
          echo "Exit code: $?"

  examples-remote:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - examples/12-remote-actions.yml
          - examples/13-remote-docker-action.yml
        mode:
          - --worktree
          - --local
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Checkout bit dependency
        run: git clone --depth 1 https://github.com/bit-vcs/bit.git ../../bit-vcs/bit
      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Moon update
        run: moon update
      - name: Build CLI
        run: moon build src/cmd/actrun --target native
      - name: Run example
        run: |
          ACTRUN=_build/native/release/build/cmd/actrun/actrun.exe
          $ACTRUN ${{ matrix.example }} ${{ matrix.mode }} --trust --trigger push

  examples-nix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - examples/17-nix-packages.yml
          - examples/20-nix-no-nix.yml
        mode:
          - --worktree
          - --local
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Checkout bit dependency
        run: git clone --depth 1 https://github.com/bit-vcs/bit.git ../../bit-vcs/bit
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Moon update
        run: moon update
      - name: Build CLI
        run: moon build src/cmd/actrun --target native
      - name: Run example
        run: |
          ACTRUN=_build/native/release/build/cmd/actrun/actrun.exe
          $ACTRUN ${{ matrix.example }} ${{ matrix.mode }} --trust --trigger push
