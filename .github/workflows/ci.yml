name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Secretlint
        if: ${{ !env.ACTRUN_LOCAL }}
        run: npx --yes -p secretlint -p @secretlint/secretlint-rule-preset-recommend secretlint "**/*"
      - name: Checkout bit dependency
        if: ${{ !env.ACTRUN_LOCAL }}
        run: git clone --depth 1 https://github.com/bit-vcs/bit.git ../../bit-vcs/bit
      - name: Setup just
        uses: taiki-e/install-action@e9e8e031bcd90cdbe8ac6bb1d376f8596e587fbf # v2.70.2
        with:
          tool: just
      - name: Install MoonBit CLI
        if: ${{ !env.ACTRUN_LOCAL }}
        uses: ./.github/actions/setup-moonbit
      - name: Moon version
        run: moon version --all
      - name: Moon update
        if: ${{ !env.ACTRUN_LOCAL }}
        run: moon update
      - name: Verify format
        run: just fmt-check
      - name: Verify generated interfaces
        run: just info-check

  test:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: native
          - os: macos-latest
            target: native
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Checkout bit dependency
        if: ${{ !env.ACTRUN_LOCAL }}
        run: git clone --depth 1 https://github.com/bit-vcs/bit.git ../../bit-vcs/bit
      - name: Setup just
        uses: taiki-e/install-action@e9e8e031bcd90cdbe8ac6bb1d376f8596e587fbf # v2.70.2
        with:
          tool: just
      - name: Install MoonBit CLI
        if: ${{ !env.ACTRUN_LOCAL }}
        uses: ./.github/actions/setup-moonbit
      - name: Moon version
        run: moon version --all
      - name: Moon update
        if: ${{ !env.ACTRUN_LOCAL }}
        run: moon update
      - name: Moon check
        run: just target=${{ matrix.target }} check
      - name: Moon test
        run: just target=${{ matrix.target }} test

  nix-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./.github/actions/setup-nix
      - name: Build
        run: nix build
      - name: Smoke test
        run: nix run . -- workflow list

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Checkout bit dependency
        if: ${{ !env.ACTRUN_LOCAL }}
        run: git clone --depth 1 https://github.com/bit-vcs/bit.git ../../bit-vcs/bit
      - name: Setup just
        uses: taiki-e/install-action@e9e8e031bcd90cdbe8ac6bb1d376f8596e587fbf # v2.70.2
        with:
          tool: just
      - name: Install MoonBit CLI
        if: ${{ !env.ACTRUN_LOCAL }}
        uses: ./.github/actions/setup-moonbit
      - name: Moon update
        if: ${{ !env.ACTRUN_LOCAL }}
        run: moon update
      - name: Build CLI
        run: moon build src/cmd/actrun --target native
      - name: Run E2E scenarios
        run: just e2e
