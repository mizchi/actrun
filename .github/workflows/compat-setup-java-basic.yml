name: Compat Setup Java Basic

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - "**"
    paths:
      - .github/workflows/__compat_setup_java_basic__.trigger

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - id: setup
        name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build report
        shell: bash
        run: |
          mkdir -p report
          printf '%s' "$(java --version | head -1)" > report/result.txt
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: compat-setup-java-basic-report
          path: report/result.txt
