name: Compat Setup Go Basic

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - "**"
    paths:
      - .github/workflows/__compat_setup_go_basic__.trigger

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - id: setup
        name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build report
        shell: bash
        run: |
          mkdir -p report
          printf '%s' "$(go version)" > report/result.txt
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: compat-setup-go-basic-report
          path: report/result.txt
