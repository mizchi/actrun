name: Compat Setup Python Basic

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - "**"
    paths:
      - .github/workflows/__compat_setup_python_basic__.trigger

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - id: setup
        name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build report
        shell: bash
        run: |
          mkdir -p report
          printf '%s|%s' \
            "${{ steps.setup.outputs.python-version }}" \
            "$(python --version)" > report/result.txt
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: compat-setup-python-basic-report
          path: report/result.txt
