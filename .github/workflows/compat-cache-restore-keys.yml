name: Compat Cache Restore Keys

on:
  workflow_dispatch:
    inputs:
      compat_key:
        description: Unique compat prefix for cache restore-keys
        required: true
        type: string
  push:
    tags-ignore:
      - "**"
    paths:
      - .github/workflows/__compat_cache_restore_keys__.trigger

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Prepare cache
        shell: bash
        run: |
          mkdir -p cache-dir
          printf '%s' ocean > cache-dir/value.txt
      - name: Save cache
        uses: actions/cache/save@v4
        with:
          key: ${{ inputs.compat_key }}-v1
          path: cache-dir

  restore:
    needs:
      - save
    runs-on: ubuntu-latest
    steps:
      - name: Clear path
        shell: bash
        run: rm -rf cache-dir
      - id: restore
        name: Restore cache
        uses: actions/cache/restore@v4
        with:
          key: ${{ inputs.compat_key }}-v2
          restore-keys: |
            ${{ inputs.compat_key }}-
          path: cache-dir
      - name: Build report
        shell: bash
        run: |
          mkdir -p report
          printf '%s|%s' \
            "${{ steps.restore.outputs.cache-hit }}" \
            "$(cat cache-dir/value.txt)" > report/result.txt
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: compat-cache-restore-keys-report
          path: report/result.txt
