name: Compat Artifact Glob Directory

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - "**"
    paths:
      - .github/workflows/compat-artifact-glob-directory.yml

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Produce files
        shell: bash
        run: |
          mkdir -p pkg/nested logs/linux logs/macos
          printf '%s' root > pkg/root.txt
          printf '%s' child > pkg/nested/child.txt
          printf '%s' linux > logs/linux/out.txt
          printf '%s' macos > logs/macos/out.txt
      - name: Upload directory artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dir-bundle
          path: pkg/
      - name: Upload glob artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: log-bundle
          path: logs/*/out.txt
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: restored
      - name: Build report
        shell: bash
        run: |
          mkdir -p report
          printf '%s|%s|%s|%s|%s|%s' \
            "$(cat restored/dir-bundle/root.txt)" \
            "$(cat restored/dir-bundle/nested/child.txt)" \
            "$(cat restored/log-bundle/linux/out.txt)" \
            "$(cat restored/log-bundle/macos/out.txt)" \
            "$(test -d restored/dir-bundle/pkg && echo yes || echo no)" \
            "$(test -f restored/log-bundle/out.txt && echo yes || echo no)" > report/result.txt
      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compat-artifact-glob-directory-report
          path: report/result.txt
