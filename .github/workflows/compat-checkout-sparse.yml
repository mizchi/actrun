name: Compat Checkout Sparse

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - "**"
    paths:
      - .github/workflows/compat-checkout-sparse.yml

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: repo
          sparse-checkout: |
            README.md
            .github
      - name: Build report
        shell: bash
        run: |
          mkdir -p report
          printf '%s|%s|%s' \
            "$(test -f repo/README.md && echo yes || echo no)" \
            "$(test -f repo/.github/workflows/compat-checkout-sparse.yml && echo yes || echo no)" \
            "$(test -f repo/LICENSE && echo yes || echo no)" > report/result.txt
      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compat-checkout-sparse-report
          path: report/result.txt
