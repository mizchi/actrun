name: Compat Checkout Sparse

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/compat-checkout-sparse.yml

permissions:
  contents: read
  actions: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          path: repo
          sparse-checkout: |
            README.md
            .github
      - name: Build report
        shell: bash
        run: |
          mkdir -p report
          printf '%s|%s|%s' \
            "$(test -f repo/README.md && echo yes || echo no)" \
            "$(test -f repo/.github/workflows/compat-checkout-sparse.yml && echo yes || echo no)" \
            "$(test -f repo/LICENSE && echo yes || echo no)" > report/result.txt
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: compat-checkout-sparse-report
          path: report/result.txt
