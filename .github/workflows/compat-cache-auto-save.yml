name: Compat Cache Auto Save

on:
  workflow_dispatch:
    inputs:
      compat_key:
        description: Compat cache key
        required: true
        type: string
  push:
    tags-ignore:
      - "**"
    paths:
      - .github/workflows/__compat_cache_auto_save__.trigger

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Prepare cache
        shell: bash
        run: |
          mkdir -p cache-dir
          printf '%s' ocean > cache-dir/value.txt
      - name: Cache
        id: cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          key: ${{ inputs.compat_key }}
          path: cache-dir
      - name: Verify miss output
        shell: bash
        run: |
          test -z "${{ steps.cache.outputs.cache-hit }}"

  restore:
    needs:
      - save
    runs-on: ubuntu-latest
    steps:
      - name: Clear path
        shell: bash
        run: rm -rf cache-dir
      - name: Cache
        id: cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          key: ${{ inputs.compat_key }}
          path: cache-dir
      - name: Build report
        shell: bash
        run: |
          mkdir -p report
          printf '%s|%s' \
            "${{ steps.cache.outputs.cache-hit }}" \
            "$(cat cache-dir/value.txt)" > report/result.txt
      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compat-cache-auto-save-report
          path: report/result.txt
