name: Compat Reusable Secrets Inherit Callee

on:
  workflow_call:
    secrets:
      COMPAT_SECRET:
        required: true
    outputs:
      result:
        value: ${{ jobs.probe.outputs.result }}

jobs:
  probe:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.capture.outputs.result }}
    steps:
      - name: Capture inherited secret presence
        id: capture
        shell: bash
        run: |
          mkdir -p report
          if [ -n "${{ secrets.COMPAT_SECRET }}" ]; then
            value=present
          else
            value=missing
          fi
          printf 'result=%s' "$value" >> "$GITHUB_OUTPUT"
