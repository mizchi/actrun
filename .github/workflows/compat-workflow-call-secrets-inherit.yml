name: Compat Workflow Call Secrets Inherit

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - "**"
    paths:
      - .github/workflows/compat-workflow-call-secrets-inherit.yml
      - .github/workflows/__compat_reusable_secrets_inherit.yml

jobs:
  call:
    uses: ./.github/workflows/__compat_reusable_secrets_inherit.yml
    secrets: inherit

  report:
    needs: [call]
    runs-on: ubuntu-latest
    steps:
      - name: Build report
        shell: bash
        run: |
          mkdir -p report
          printf '%s' "${{ needs.call.outputs.result }}" > report/result.txt
      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compat-workflow-call-secrets-inherit-report
          path: report/result.txt
