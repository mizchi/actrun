name: Compat GitHub Script Basic

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - "**"
    paths:
      - .github/workflows/__compat_github_script_basic__.trigger

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - id: script
        name: Run GitHub Script
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            core.setOutput('result', 'hello-from-script')
      - name: Build report
        shell: bash
        run: |
          mkdir -p report
          printf '%s' "${{ steps.script.outputs.result }}" > report/result.txt
      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compat-github-script-basic-report
          path: report/result.txt
