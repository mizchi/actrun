name: Compat Artifact Multi Job

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - "**"
    paths:
      - .github/workflows/compat-artifact-multi-job.yml

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Produce files
        shell: bash
        run: |
          mkdir -p produced
          printf '%s' alpha > produced/alpha.txt
          printf '%s' beta > produced/beta.txt
      - name: Upload bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compat-bundle
          path: |
            produced/alpha.txt
            produced/beta.txt

  unpack:
    needs:
      - pack
    runs-on: ubuntu-latest
    steps:
      - name: Download bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: compat-bundle
          path: restored
      - name: Build report
        shell: bash
        run: |
          mkdir -p report
          printf '%s|%s' \
            "$(cat restored/alpha.txt)" \
            "$(cat restored/beta.txt)" > report/result.txt
      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compat-artifact-report
          path: report/result.txt
