name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature for actrun!

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What use case are you trying to address?
      placeholder: "e.g., I want to run matrix jobs in parallel but actrun doesn't support it yet"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: "e.g., Add a --parallel flag to actrun workflow run"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've tried?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Workflow examples, screenshots, or any other relevant information.
