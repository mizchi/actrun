name: e2e-checkout-clean
'on': push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - id: checkout_keep
        uses: actions/checkout@v4
        with:
          clean: false
      - id: create_dirty
        shell: bash
        run: |
          printf '%s' 'keep-me' > scratch.txt
      - id: keep_again
        uses: actions/checkout@v4
        with:
          clean: false
      - id: verify_keep
        shell: bash
        run: |
          printf 'preserved=%s\n' "$(test -f scratch.txt && echo yes || echo no)" >> "$GITHUB_OUTPUT"
      - id: clean_checkout
        uses: actions/checkout@v4
      - id: verify_clean
        shell: bash
        run: |
          printf '%s|%s' "${{ steps.verify_keep.outputs.preserved }}" "$(test -f scratch.txt && echo yes || echo no)"
