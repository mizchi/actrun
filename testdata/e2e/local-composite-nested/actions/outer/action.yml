name: outer
inputs:
  message:
    default: outer-default
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        echo "phase=outer" >> "$GITHUB_STATE"
    - uses: ../inner
      with:
        message: ${{ inputs.message }}
    - shell: bash
      run: |
        printf '%s|%s' "${{ inputs.message }}" "$STATE_phase" > outer.txt
