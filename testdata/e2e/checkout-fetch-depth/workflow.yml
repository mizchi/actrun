name: e2e-checkout-fetch-depth
'on': push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - id: shallow
        uses: actions/checkout@v4
        with:
          path: shallow
      - id: full
        uses: actions/checkout@v4
        with:
          path: full
          fetch-depth: 0
      - id: verify
        shell: bash
        run: |
          printf 'shallow=%s|%s\n' "$(git -C shallow rev-list --count HEAD)" "$(test -f shallow/.git/shallow && echo yes || echo no)"
          printf 'full=%s|%s' "$(git -C full rev-list --count HEAD)" "$(test -f full/.git/shallow && echo yes || echo no)"
