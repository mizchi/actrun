name: e2e-checkout-persist-credentials
'on': push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - id: no-creds
        uses: actions/checkout@v4
        with:
          path: no-creds
          persist-credentials: false
      - id: verify
        shell: bash
        run: |
          cred=$(git -C no-creds config --local --get-all credential.helper 2>/dev/null || echo "none")
          printf '%s' "$cred"
