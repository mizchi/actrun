name: e2e-checkout-container
'on': push
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: node:20-bookworm
    steps:
      - id: checkout
        uses: actions/checkout@v4
      - id: verify
        shell: bash
        run: |
          printf '%s|%s' "$(cat tracked.txt)" "$(test -e .git && echo yes || echo no)"
