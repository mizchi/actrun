name: e2e-repo-event
'on':
  push:
    paths:
      - src/**
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - id: copy
        run: |
          mkdir -p artifacts
          cat src/message.txt > artifacts/message.txt
      - id: context
        run: |
          printf '%s|%s|%s|%s|%s' "${GITHUB_EVENT_NAME}" "${GITHUB_REF_NAME}" "${GITHUB_REPOSITORY}" "${GITHUB_ACTOR}" "${GITHUB_SHA}" > artifacts/context.txt
