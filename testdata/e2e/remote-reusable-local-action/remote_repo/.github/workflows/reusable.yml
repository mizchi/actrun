name: reusable
on:
  workflow_call:
    inputs:
      message:
        required: true
        type: string
    outputs:
      result:
        value: ${{ jobs.verify.outputs.result }}
    secrets:
      token:
        required: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - id: local
        uses: ./.github/actions/emit
        with:
          message: ${{ inputs.message }}
          token: ${{ secrets.token }}
  verify:
    needs: [build]
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.capture.outputs.result }}
    steps:
      - id: capture
        run: printf 'result=%s' "$(cat inner.txt)" >> "$GITHUB_OUTPUT"
