name: e2e-wasm-action
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTION_RUNNER_WASM_ACTION_ROOT: wasm-actions
    steps:
      - id: module
        uses: wasm://std/echo@v1
        with:
          message: hello
      - id: verify
        run: printf '%s' '${{ steps.module.outputs.result }}' > verify.txt
        shell: bash
