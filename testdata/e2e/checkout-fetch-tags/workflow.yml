name: e2e-checkout-fetch-tags
'on': push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - id: with-tags
        uses: actions/checkout@v4
        with:
          path: with-tags
          fetch-tags: true
          fetch-depth: 0
      - id: without-tags
        uses: actions/checkout@v4
        with:
          path: without-tags
          fetch-tags: false
          fetch-depth: 0
      - id: verify
        shell: bash
        run: |
          printf 'with-tags=%s\n' "$(git -C with-tags tag | wc -l | tr -d ' ')"
          printf 'without-tags=%s' "$(git -C without-tags tag | wc -l | tr -d ' ')"
