name: ci-matrix-step-if
on: push
jobs:
  build:
    strategy:
      matrix:
        include:
          - target: native
            deploy: "true"
          - target: js
            deploy: "false"
    runs-on: ubuntu-latest
    steps:
      - id: show
        run: printf '%s' '${{ matrix.target }}'
      - id: deploy
        if: ${{ matrix.deploy == 'true' }}
        run: printf 'deploy-%s' '${{ matrix.target }}'
