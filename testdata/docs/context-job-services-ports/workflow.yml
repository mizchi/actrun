name: context-job-services-ports
'on': push
jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        ports:
          - "5432:5432"
        options: --health-cmd pg_isready
    steps:
      - id: show
        shell: bash
        env:
          PORT_FROM_ENV: ${{ job.services.postgres.ports[5432] }}
        run: |
          printf '<%s|%s>' "${{ job.services.postgres.ports[5432] }}" "$PORT_FROM_ENV"
      - id: verify
        if: ${{ job.services.postgres.ports[5432] == '5432' }}
        shell: bash
        run: |
          printf '|yes'
