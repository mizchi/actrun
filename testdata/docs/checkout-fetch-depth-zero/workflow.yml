name: docs-checkout-fetch-depth-zero
'on': push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: verify
        shell: bash
        run: |
          printf '<%s|%s>' "$(git rev-list --count HEAD)" "$(test -f .git/shallow && echo yes || echo no)"
