name: caller
on: push
jobs:
  call:
    uses: ./.github/workflows/outer.yml
    with:
      message: nested
    secrets:
      token: ${{ secrets.CALL_TOKEN }}
  after:
    needs: [call]
    runs-on: ubuntu-latest
    steps:
      - id: package
        run: |
          mkdir -p artifacts
          printf '%s' "${{ needs.call.outputs.result }}-done" > artifacts/result.txt
