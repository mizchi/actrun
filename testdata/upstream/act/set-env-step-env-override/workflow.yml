name: act-set-env-step-env-override
'on': push
jobs:
  check:
    runs-on: ubuntu-latest
    env:
      MY_ENV: test
    steps:
      - id: before
        shell: bash
        run: printf '<%s>' "${{ env.MY_ENV }}"
      - id: use_action
        uses: ./action
        env:
          MY_ENV: val
      - id: after
        shell: bash
        run: printf '<%s>' "${{ env.MY_ENV }}"
